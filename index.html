<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday ZZY</title>
<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}
body{
    overflow:hidden;
    width:100vw;
    height:100vh;
    font-family: Georgia, serif;
}
#bg{
    position:fixed;
    inset:0;
    background:url("assets/grass.jpg") center center / cover no-repeat;
}
#bg::after{
    content:"";
    position:absolute;
    inset:0;
    background:rgba(0,0,0,.35);
}
#container{
    position:relative;
    z-index:2;
    width:100%;
    height:100%;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    color:white;
    text-align:center;
}
h1{
    font-size:clamp(40px,8vw,90px);
    letter-spacing:3px;
    margin-bottom:30px;
    text-shadow:0 4px 20px rgba(0,0,0,.5);
}
button{
    border:none;
    border-radius:999px;
    padding:14px 35px;
    font-size:18px;
    cursor:pointer;
    transition:.3s;
}
button:hover{
    transform:scale(1.05);
}
#message{
    margin-top:50px;
    opacity:0;
    transition:2s;
    font-size:24px;
    line-height:1.8;
}
.show{
    opacity:1 !important;
}
#footer{
    position:absolute;
    bottom:40px;
    left:50%;
    transform:translateX(-50%);
    font-size:14px;
    opacity:.75;
}
</style>
</head>
<body>
<div id="bg"></div>
<audio id="bgm" loop>
    <source src="assets/Matilda.mp3" type="audio/mpeg">
</audio>
<div id="container">
<h1>Happy Birthday ZZY</h1>
<button id="enterBtn">
    Enter
</button>
<div id="message">
    Always be cute and alive.
    <br><br>
    记得开心哦。
    <br>
    嘿嘿，摸摸你。
</div>
<div id="footer">
    From 弟弟
</div>
</div>
<script>
const btn = document.getElementById("enterBtn");
const bgm = document.getElementById("bgm");
const msg = document.getElementById("message");
btn.addEventListener("click", () => {
    bgm.play();
    btn.style.display = "none";
    setTimeout(()=>{
        msg.classList.add("show");
    },1200);
});
</script>
</body>
</html>
